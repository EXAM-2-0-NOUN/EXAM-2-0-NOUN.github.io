<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Operating Systems Exam</title>
    <style>
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --ink: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --ok: #16a34a;
        --danger: #dc2626;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--ink);
        background: var(--bg);
      }

      .page {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px 32px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .title {
        font-size: 20px;
        font-weight: 700;
      }

      .timer {
        font-weight: 700;
      }

      .layout {
        display: grid;
        grid-template-columns: 1fr 290px;
        gap: 16px;
      }

      .card {
        background: var(--panel);
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 18px;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        color: var(--muted);
      }

      .section-badge {
        font-size: 12px;
        font-weight: 700;
        color: #1d4ed8;
        background: #dbeafe;
        border-radius: 999px;
        padding: 4px 10px;
      }

      .q-text {
        font-size: 18px;
        margin: 14px 0;
      }

      .options {
        display: grid;
        gap: 10px;
      }

      .option {
        display: flex;
        gap: 10px;
        align-items: center;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
      }

      .option:hover {
        border-color: var(--accent);
      }

      .blank-input {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 12px;
        font-size: 15px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 9px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-ghost {
        background: #e2e8f0;
        color: var(--ink);
      }

      .btn-danger {
        background: var(--danger);
        color: #fff;
      }

      .progress {
        margin-top: 10px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }

      .q-btn {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        border-radius: 8px;
        padding: 8px 0;
        cursor: pointer;
      }

      .q-btn.active {
        border-color: var(--accent);
        background: #dbeafe;
      }

      .q-btn.answered {
        border-color: var(--ok);
        background: #dcfce7;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }
        .grid {
          grid-template-columns: repeat(8, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div class="title">Operating Systems Exam (100 Questions)</div>
        <div class="timer">Time Left: <span id="timer">01:30:00</span></div>
      </div>

      <div class="layout">
        <div class="card">
          <div class="meta">
            <div id="questionLabel">Question 1 / 100</div>
            <div class="section-badge" id="sectionBadge">Section A</div>
          </div>
          <div class="q-text" id="questionText"></div>
          <div class="options" id="options"></div>
          <div class="controls">
            <button class="btn-ghost" id="prevBtn">Previous</button>
            <button class="btn-primary" id="nextBtn">Next</button>
            <button class="btn-danger" id="finishBtn">Finish Exam</button>
          </div>
          <div class="progress" id="progress">0 / 100 answered</div>
        </div>

        <div class="card">
          <div style="font-weight: 700; margin-bottom: 10px">Jump to Question</div>
          <div class="grid" id="questionGrid"></div>
        </div>
      </div>
    </div>

    <script>

        { id: 87, section: "B", type: "mcq", text: "A zombie process is:", options: ["Active", "Completed but not removed", "Waiting", "New"], answer: "Completed but not removed" },
        { id: 88, section: "B", type: "mcq", text: "Semaphore was introduced by:", options: ["Turing", "Dijkstra", "Tanenbaum", "Galvin"], answer: "Dijkstra" },

        "mutual exclusion",
        "critical",
        "resource",
        "circular",
        "logical",
        "physical",
        "paging",
        "segmentation",
        "internal",
        "external",
        "compaction",
        "thread",
        "multiprogramming",
        "operating",

        "real",
        "secondary (disk)",
        "dynamic",
        "dynamic",
        "short-term",
        "ready",
        "terminated",
        "cooperating",
        "interprocess (IPC)",
        "communication",
        "accounting",
        "efficiency",
        "open",
        "multi-user",
        "Shortest Job First (SJF)",
        "batch",
        "call",
        "swapping"

      const sectionBAnswerLetters = [
        "B", "C", "B", "C", "B", "B", "C", "A", "C", "B",
        "C", "C", "C", "B", "B", "B", "B", "B", "A", "B",
        "A", "B", "A", "B", "B", "A", "B", "A", "A", "B",
        "D", "A", "C", "A", "B", "A", "A", "C", "B", "C",
        "C", "B", "D", "B", "B", "A", "B", "B", "A", "A",
        "A", "A", "A", "A", "B", "A", "B", "A", "B", "A"
      ];

      rawQuestions.forEach((q) => {
        if (q.id >= 1 && q.id <= 40) {
          q.answer = sectionAAnswers[q.id - 1];
          return;
        }
        if (q.id >= 41 && q.id <= 100 && Array.isArray(q.options)) {
          const letter = sectionBAnswerLetters[q.id - 41];
          const optionIndex = letter.charCodeAt(0) - 65;
          if (optionIndex >= 0 && optionIndex < q.options.length) {
            q.answer = q.options[optionIndex];
          }
        }
      });

      function shuffleArray(input) {
        const arr = input.slice();
        for (let i = arr.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          const temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
        return arr;
      }

      const questions = shuffleArray(rawQuestions);
      const totalQuestions = questions.length;
      const answers = new Array(totalQuestions).fill("");

      let currentIndex = 0;
      let remainingSeconds = 90 * 60;

      const timerEl = document.getElementById("timer");
      const questionLabelEl = document.getElementById("questionLabel");
      const sectionBadgeEl = document.getElementById("sectionBadge");
      const questionTextEl = document.getElementById("questionText");
      const optionsEl = document.getElementById("options");
      const progressEl = document.getElementById("progress");
      const questionGridEl = document.getElementById("questionGrid");

      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");
      const finishBtn = document.getElementById("finishBtn");

      function formatTime(sec) {
        const hh = String(Math.floor(sec / 3600)).padStart(2, "0");
        const mm = String(Math.floor((sec % 3600) / 60)).padStart(2, "0");
        const ss = String(sec % 60).padStart(2, "0");
        return hh + ":" + mm + ":" + ss;
      }

      function isAnswered(value) {
        return String(value || "").trim().length > 0;
      }

      function updateProgress() {
        const done = answers.filter((a) => isAnswered(a)).length;
        progressEl.textContent = done + " / " + totalQuestions + " answered";
      }

      function updateGridState() {
        const buttons = questionGridEl.querySelectorAll(".q-btn");
        buttons.forEach((btn, idx) => {
          btn.classList.toggle("active", idx === currentIndex);
          btn.classList.toggle("answered", isAnswered(answers[idx]));
        });
      }

      function renderQuestion(index) {
        const q = questions[index];
        questionLabelEl.textContent = "Question " + (index + 1) + " / " + totalQuestions;
        sectionBadgeEl.textContent = q.section === "A" ? "Section A - Fill Blank" : "Section B - MCQ";
        questionTextEl.textContent = q.text;
        optionsEl.innerHTML = "";

        if (q.type === "mcq") {
          q.options.forEach((opt, optIndex) => {
            const label = document.createElement("label");
            label.className = "option";

            const input = document.createElement("input");
            input.type = "radio";
            input.name = "q_" + index;
            input.value = opt;
            input.checked = answers[index] === opt;
            input.addEventListener("change", () => {
              answers[index] = opt;
              updateProgress();
              updateGridState();
            });

            const span = document.createElement("span");
            span.textContent = String.fromCharCode(65 + optIndex) + ". " + opt;

            label.appendChild(input);
            label.appendChild(span);
            optionsEl.appendChild(label);
          });
        } else {
          const input = document.createElement("input");
          input.type = "text";
          input.className = "blank-input";
          input.placeholder = "Type your answer here...";
          input.value = answers[index] || "";
          input.addEventListener("input", (event) => {
            answers[index] = event.target.value;
            updateProgress();
            updateGridState();
          });
          optionsEl.appendChild(input);
        }

        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === totalQuestions - 1;
        updateGridState();
      }

      function createGrid() {
        questionGridEl.innerHTML = "";
        for (let i = 0; i < totalQuestions; i += 1) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "q-btn";
          btn.textContent = String(i + 1);
          btn.addEventListener("click", () => {
            currentIndex = i;
            renderQuestion(currentIndex);
          });
          questionGridEl.appendChild(btn);
        }
      }

      function finishExam() {
        const results = questions.map((q, idx) => {
          const selected = String(answers[idx] || "").trim();
          const correct = String(q.answer || "").trim();
          const isCorrect = selected.toLowerCase() === correct.toLowerCase();
          return {
            id: q.id,
            text: q.text,
            options: q.type === "mcq" ? q.options : [],
            selected: selected,
            correct: correct,
            isCorrect: isCorrect
          };
        });

        const score = results.filter((r) => r.isCorrect).length;
        const payload = {
          total: totalQuestions,
          score: score,
          results: results
        };
        localStorage.setItem("examResults", JSON.stringify(payload));
        window.location.href = "results.html";
      }

      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex -= 1;
          renderQuestion(currentIndex);
        }
      });

      nextBtn.addEventListener("click", () => {
        if (currentIndex < totalQuestions - 1) {
          currentIndex += 1;
          renderQuestion(currentIndex);
        }
      });

      finishBtn.addEventListener("click", finishExam);

      setInterval(() => {
        timerEl.textContent = formatTime(remainingSeconds);
        if (remainingSeconds <= 0) {
          finishExam();
          return;
        }
        remainingSeconds -= 1;
      }, 1000);

      createGrid();
      renderQuestion(currentIndex);
      updateProgress();
      timerEl.textContent = formatTime(remainingSeconds);
    </script>
  </body>
</html>
