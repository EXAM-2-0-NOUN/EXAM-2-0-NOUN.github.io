<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CIT Exam</title>
    <style>
      :root { --bg:#f8fafc; --panel:#fff; --ink:#0f172a; --muted:#64748b; --accent:#2563eb; --border:#e2e8f0; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; color:var(--ink); background:var(--bg); }
      .page { max-width:1100px; margin:24px auto; padding:0 16px 32px; }
      .header { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:14px; }
      .title { font-size:20px; font-weight:700; }
      .timer { font-weight:700; }
      .layout { display:grid; grid-template-columns:1fr 290px; gap:16px; }
      .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:18px; }
      .meta { display:flex; justify-content:space-between; color:var(--muted); margin-bottom:10px; }
      .q-text { font-size:18px; margin:14px 0; }
      .info { color:var(--muted); background:#f1f5f9; border-radius:8px; padding:12px; }
      .controls { display:flex; gap:8px; margin-top:14px; }
      button { border:0; border-radius:8px; padding:9px 12px; font-weight:600; cursor:not-allowed; opacity:.65; }
      .btn-primary { background:var(--accent); color:#fff; }
      .btn-ghost { background:#e2e8f0; color:var(--ink); }
      .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
      .q-btn { border:1px solid #cbd5e1; background:#f8fafc; border-radius:8px; padding:8px 0; opacity:.6; }
      @media (max-width:900px) { .layout{grid-template-columns:1fr;} .grid{grid-template-columns:repeat(8,1fr);} }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div class="title">CIT Exam</div>
        <div class="timer">Time Left: 01:30:00</div>
      </div>
      <div class="layout">
        <div class="card">
          <div class="meta"><div>Question 0 / 0</div><div>No Section</div></div>
          <div class="q-text">No questions added yet for this course.</div>
          <div class="info">Add questions to this page later, then enable navigation and scoring.</div>
          <div class="controls">
            <button class="btn-ghost" disabled>Previous</button>
            <button class="btn-primary" disabled>Next</button>
          </div>
        </div>
        <div class="card">
          <div style="font-weight:700;margin-bottom:10px;">Jump to Question</div>
          <div class="grid"><button class="q-btn" disabled>0</button></div>
        </div>
      </div>
    </div>
  </body>
</html>
